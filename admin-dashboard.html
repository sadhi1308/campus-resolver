<!DOCTYPE html>

    <title>Admin Dashboard - Campus Resolver</title>
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Admin Dashboard</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Stats Section -->
    <div class="stats-container">
        <div class="stat-card">
            <h3>Total Complaints</h3>
            <p id="totalCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <p id="pendingCount">0</p>
        </div>

        <div class="stat-card">
            <h3>In Progress</h3>
            <p id="progressCount">0</p>
        </div>

        <div class="stat-card">
            <h3>Resolved</h3>
            <p id="resolvedCount">0</p>
        </div>
    </div>

    <!-- Complaint Boxes -->
    <div class="complaint-container" id="complaintContainer"></div>
